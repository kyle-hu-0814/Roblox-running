<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Web Obby</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        /* Roblox-style Leaderboard UI */
        #leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            min-width: 150px;
            border: 2px solid #555;
        }
        #leaderboard h3 { margin: 0 0 10px 0; font-size: 16px; text-align: center; border-bottom: 1px solid #777; padding-bottom: 5px;}
        .stat { display: flex; justify-content: space-between; margin: 5px 0; font-size: 14px; }
        
        /* Controls Overlay */
        #controls-ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 13px;
            pointer-events: none;
        }
    </style>
    <!-- Include Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- UI Elements -->
    <div id="leaderboard">
        <h3>Leaderstats</h3>
        <div class="stat"><span>Wins:</span><span id="wins-val">0</span></div>
        <div class="stat"><span>Deaths:</span><span id="deaths-val">0</span></div>
    </div>

    <div id="controls-ui">
        <strong>Controls:</strong><br>
        Move: WASD / Arrow Keys<br>
        Jump: Spacebar<br>
        Camera: Move Mouse
    </div>

    <script>
        // --- 1. SETUP THREE.JS SCENE & CAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // --- 3. GAME STATE & LEADERBOARD ---
        const stats = { wins: 0, deaths: 0 };
        function updateUI() {
            document.getElementById('wins-val').innerText = stats.wins;
            document.getElementById('deaths-val').innerText = stats.deaths;
        }

        // --- 4. CREATE PLAYER ---
        const playerGeometry = new THREE.BoxGeometry(1, 2, 1); // Roblox-like blocky character
        const playerMaterial = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        scene.add(player);

        // Physics variables
        const spawnPoint = new THREE.Vector3(0, 2, 0);
        player.position.copy(spawnPoint);
        
        let velocity = new THREE.Vector3();
        let isGrounded = false;
        const speed = 0.12;
        const gravity = 0.009;
        const jumpForce = 0.22;

        // --- 5. CREATE OBBY WORLD ---
        const collidableObjects = [];
        const killBricks = [];
        const winBricks = [];

        function createPart(width, height, depth, x, y, z, color, type) {
            const geo = new THREE.BoxGeometry(width, height, depth);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            // Bounds box for basic AABB collision tracking
            mesh.geometry.computeBoundingBox();
            
            if (type === "kill") killBricks.push(mesh);
            else if (type === "win") winBricks.push(mesh);
            else collidableObjects.push(mesh);
        }

        // Spawn Platform
        createPart(10, 1, 10, 0, 0, 0, 0x808080, "normal");
        // Jump Obstacles
        createPart(3, 0.5, 3, 0, 0.5, -10, 0x0000ff, "normal");
        createPart(3, 0.5, 3, 5, 1.5, -18, 0x0000ff, "normal");
        createPart(3, 0.5, 3, -4, 2.5, -26, 0x0000ff, "normal");
        // Lava Floor (Kill Zone)
        createPart(100, 1, 100, 0, -5, -20, 0xff0000, "kill");
        // Win Zone
        createPart(8, 1, 8, 0, 3.5, -38, 0xffd700, "win");

        // --- 6. CONTROLS ---
        const keys = { w: false, a: false, s: false, d: false, Space: false };
        window.addEventListener('keydown', (e) => { if(keys[e.code] !== undefined) keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { if(keys[e.code] !== undefined) keys[e.code] = false; });

        // Simple Mouse Camera Rotation
        let mouseX = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        });

        // --- 7. GAME LOOP & PHYSICS ---
        function resetPlayer() {
            player.position.copy(spawnPoint);
            velocity.set(0, 0, 0);
        }

        function checkCollision(mesh) {
            const pBounds = new THREE.Box3().setFromObject(player);
            const mBounds = new THREE.Box3().setFromObject(mesh);
            return pBounds.intersectsBox(mBounds);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Movement Physics
            if (keys.KeyW || keys.ArrowUp) player.position.z -= speed;
            if (keys.KeyS || keys.ArrowDown) player.position.z += speed;
            if (keys.KeyA || keys.ArrowLeft) player.position.x -= speed;
            if (keys.KeyD || keys.ArrowRight) player.position.x += speed;

            // Gravity applications
            velocity.y -= gravity;
            player.position.y += velocity.y;
            isGrounded = false;

            // Platform Collisions (Standing on blocks)
            collidableObjects.forEach(platform => {
                if (checkCollision(platform)) {
                    // Check if falling down onto platform
                    if (velocity.y <= 0 && player.position.y > platform.position.y) {
                        player.position.y = platform.position.y + (platform.geometry.parameters.height/2) + 1;
                        velocity.y = 0;
                        isGrounded = true;
                    }
                }
            });

            // Jump Action
            if (keys.Space && isGrounded) {
                velocity.y = jumpForce;
                isGrounded = false;
            }

            // Lava/Kill Brick Check
            killBricks.forEach(lava => {
                if (checkCollision(lava)) {
                    stats.deaths++;
                    updateUI();
                    resetPlayer();
                }
            });

            // Win Goal Check
            winBricks.forEach(goal => {
                if (checkCollision(goal)) {
                    stats.wins++;
                    updateUI();
                    resetPlayer();
                }
            });

            // Fallback Killplane (If you fall off completely)
            if (player.position.y < -15) {
                stats.deaths++;
                updateUI();
                resetPlayer();
            }

            // Camera follow smoothly behind player
            camera.position.x = player.position.x + (mouseX * 5);
            camera.position.y = player.position.y + 6;
            camera.position.z = player.position.z + 12;
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        // Handle Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Run the game loop
        animate();
    </script>
</body>
</html>
